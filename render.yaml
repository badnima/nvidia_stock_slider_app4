services:
  - type: web
    name: nima-stock-tracker
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_SNAPSHOT_URL
        sync: false
      - key: RENDER_KEY_VALUE_URL
        fromService:
          name: nima-stock-tracker-cache
          type: keyvalue
          property: connectionString
      - key: TWELVE_DATA_QUOTE_CACHE_SECONDS
        value: "60"
      - key: GOOGLE_SHEETS_SNAPSHOT_CACHE_SECONDS
        value: "900"
      - key: GOOGLE_SHEETS_PARTIAL_RETRY_SECONDS
        value: "900"
      - key: GOOGLE_SHEETS_FAILURE_RETRY_SECONDS
        value: "3600"
      - key: BACKGROUND_REFRESH_INTERVAL_SECONDS
        value: "120"

  - type: keyvalue
    name: nima-stock-tracker-cache
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
